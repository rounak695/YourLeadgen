# ─────────────────────────────────────────────────────────────────────────────
# YourLeadGen – Continuous Integration
#
# Runs on every push / PR to main:
#   1. Install Node.js dependencies (npm ci)
#   2. Validate all module imports resolve (node --check)
#   3. Run a dry-run smoke test (3 leads, no real emails sent)
# ─────────────────────────────────────────────────────────────────────────────

name: CI – Lint & Smoke Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  ci:
    name: Node ${{ matrix.node-version }} – Lint & Smoke Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────────────
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Syntax / import check on all modules ───────────────────────────
      - name: Check module syntax
        run: |
          node --check main.js
          node --check server.js
          for f in modules/*.js; do node --check "$f"; done

      # ── 5. Dry-run smoke test (no real API keys needed) ───────────────────
      # This exercises the CLI entry-point in --help mode so the full import
      # chain is validated without hitting external APIs.
      - name: Smoke test – help output
        run: node main.js 2>&1 | grep -q "Usage" && echo "✅ CLI entry-point OK"
        continue-on-error: false
